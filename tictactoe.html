<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Tic Tac Toe</title>

<link rel="stylesheet" href="tictactoe.css">

</head>


<body>


<!-- START SCREEN -->

<div id="start-screen" class="screen active">

<h1>Tic Tac Toe</h1>

<p>Choose your symbol</p>

<div class="symbol-box">

<button id="xbtn"
class="symbol selected"
onclick="chooseSymbol('X')">X</button>


<button id="obtn"
class="symbol"
onclick="chooseSymbol('O')">O</button>

</div>


<button
class="start-btn"
onclick="startGame()">Start Game</button>


<p>Player 1 picks — Player 2 gets the other</p>

</div>



<!-- GAME SCREEN -->

<div id="game-screen" class="screen">

<h1>Tic Tac Toe</h1>

<div id="status">Player X's turn</div>


<div class="board">

<div class="cell" onclick="playMove(0)"></div>
<div class="cell" onclick="playMove(1)"></div>
<div class="cell" onclick="playMove(2)"></div>

<div class="cell" onclick="playMove(3)"></div>
<div class="cell" onclick="playMove(4)"></div>
<div class="cell" onclick="playMove(5)"></div>

<div class="cell" onclick="playMove(6)"></div>
<div class="cell" onclick="playMove(7)"></div>
<div class="cell" onclick="playMove(8)"></div>

</div>


<button
class="replay-btn"
onclick="restartGame()">Replay</button>


</div>


<script src="tictactoe.js"></script>

</body>

</html>
